<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Data Quality Agent</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #1e293b; }
      button { padding: 8px 16px; border-radius: 6px; border: 1px solid #d1d5db; background: #3b82f6; color: #fff; cursor: pointer; font-size: 14px; }
      button:hover { background: #2563eb; }
      button:disabled { background: #9ca3af; cursor: not-allowed; }
      a { color: #3b82f6; text-decoration: none; }
      a:hover { text-decoration: underline; }

      .markdown-body { line-height: 1.6; }
      .markdown-body p { margin-bottom: 8px; }
      .markdown-body p:last-child { margin-bottom: 0; }
      .markdown-body ul, .markdown-body ol { margin: 8px 0; padding-left: 24px; }
      .markdown-body li { margin-bottom: 4px; }
      .markdown-body code { background: #e2e8f0; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
      .markdown-body pre { background: #1e293b; color: #e2e8f0; padding: 12px; border-radius: 6px; overflow-x: auto; margin: 8px 0; }
      .markdown-body pre code { background: none; padding: 0; }
      .markdown-body h1, .markdown-body h2, .markdown-body h3 { margin: 12px 0 6px; }
      .markdown-body h1 { font-size: 1.3em; }
      .markdown-body h2 { font-size: 1.15em; }
      .markdown-body h3 { font-size: 1.05em; }
      .markdown-body blockquote { border-left: 3px solid #cbd5e1; padding-left: 12px; color: #64748b; margin: 8px 0; }
      .markdown-body table { border-collapse: collapse; margin: 8px 0; width: 100%; }
      .markdown-body th, .markdown-body td { border: 1px solid #e2e8f0; padding: 6px 10px; text-align: left; }
      .markdown-body th { background: #f1f5f9; font-weight: 600; }
      .markdown-body hr { border: none; border-top: 1px solid #e2e8f0; margin: 12px 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>

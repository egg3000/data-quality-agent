services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dqa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dqa_password}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init.sh:/docker-entrypoint-initdb.d/00_init.sh
      - ./api/db/init:/docker-entrypoint-initdb.d/app
      - ./test_data:/docker-entrypoint-initdb.d/erp
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dqa} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_DB_URL: postgresql+asyncpg://${POSTGRES_USER:-dqa}:${POSTGRES_PASSWORD:-dqa_password}@postgres:5432/dqa_app
      DATA_SOURCE_URL: postgresql+asyncpg://${POSTGRES_USER:-dqa}:${POSTGRES_PASSWORD:-dqa_password}@postgres:5432/dqa_erp
      MODEL_PROVIDER: ${MODEL_PROVIDER:-anthropic}
      MODEL_NAME: ${MODEL_NAME:-claude-opus-4-6}
      EMBEDDINGS_PROVIDER: ${EMBEDDINGS_PROVIDER:-local}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ENV: ${ENV:-development}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./api:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - api
    volumes:
      - ./frontend/src:/app/src
    restart: unless-stopped

volumes:
  pgdata:
